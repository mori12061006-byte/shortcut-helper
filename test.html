<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Shortcut Helper — テスト</title>
  <style>
    body {
      margin: 0;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    .device-frame {
      width: 380px;
      height: 680px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      overflow: hidden;
      position: relative;
    }
    .device-label {
      position: absolute;
      top: -28px;
      left: 0;
      font-size: 12px;
      color: #6b7280;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Chrome API モック注入用のスクリプトは iframe 内で実行するため
       ここでは親フレームでローカルストレージをモックする */
  </style>
</head>
<body>
  <div style="position:relative;">
    <div class="device-label">Chrome サイドパネル プレビュー（380px）</div>
    <div class="device-frame">
      <iframe src="sidebar/test-wrapper.html" id="previewFrame"></iframe>
    </div>
  </div>
</body>
</html>
